  <text x="256" y="565" text-anchor="middle" fill="#e8e0d0" font-size="24" font-family="Georgia, serif" font-weight="bold">Divine Radiance</text>
  <text x="256" y="595" text-anchor="middle" fill="#D4AF37" font-size="14" font-family="Georgia, serif">Sacred Geometry · Tier 7</text>
  <rect x="176" y="640" width="160" height="32" rx="16" fill="rgba(212,175,55,0.15)" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="256" y="661" text-anchor="middle" fill="#D4AF37" font-size="13" font-family="system-ui" font-weight="bold">☪️ TIER 7 · DIVINE</text>
</svg>