<svg width="512" height="768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <radialGradient id="glow7" cx="50%" cy="44%" r="45%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.2"/>
      <stop offset="30%" style="stop-color:#2E7D32;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="core7" cx="50%" cy="44%" r="10%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur7">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="512" height="768" fill="url(#bg7)"/>
  <rect width="512" height="768" fill="url(#glow7)"/>
  <rect width="512" height="768" fill="url(#core7)"/>
  
  <!-- Ornate double border -->
  <rect x="8" y="8" width="496" height="752" rx="16" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  <rect x="16" y="16" width="480" height="736" rx="12" fill="none" stroke="#2E7D32" stroke-width="1.5" opacity="0.4"/>
  <rect x="24" y="24" width="464" height="720" rx="8" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Most intricate pattern - radiating light -->
  <g transform="translate(256, 320)" fill="none">
    <!-- Light rays from center -->
    <g stroke="#D4AF37" stroke-width="0.5" opacity="0.15" filter="url(#blur7)">
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(0)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(7.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(15)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(22.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(30)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(37.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(45)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(52.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(60)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(67.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(75)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(82.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(90)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(97.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(105)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(112.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(120)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(127.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(135)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(142.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(150)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(157.5)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(165)"/>
      <line x1="0" y1="-180" x2="0" y2="180" transform="rotate(172.5)"/>
    </g>
    
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="170" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="150" stroke="#2E7D32" stroke-width="0.7" opacity="0.25"/>
    <circle cx="0" cy="0" r="130" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="110" stroke="#2E7D32" stroke-width="0.8" opacity="0.35"/>
    <circle cx="0" cy="0" r="90" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="70" stroke="#2E7D32" stroke-width="1" opacity="0.45"/>
    <circle cx="0" cy="0" r="50" stroke="#D4AF37" stroke-width="1" opacity="0.55"/>
    <circle cx="0" cy="0" r="30" stroke="#2E7D32" stroke-width="1.2" opacity="0.6"/>
    
    <!-- Multi-layer stars -->
    <g stroke-width="0.8">
      <polygon points="0,-160 16,-16 160,0 16,16 0,160 -16,16 -160,0 -16,-16" stroke="#D4AF37" opacity="0.3"/>
      <polygon points="0,-160 16,-16 160,0 16,16 0,160 -16,16 -160,0 -16,-16" stroke="#D4AF37" opacity="0.3" transform="rotate(15)"/>
      <polygon points="0,-160 16,-16 160,0 16,16 0,160 -16,16 -160,0 -16,-16" stroke="#2E7D32" opacity="0.25" transform="rotate(30)"/>
      <polygon points="0,-160 16,-16 160,0 16,16 0,160 -16,16 -160,0 -16,-16" stroke="#2E7D32" opacity="0.25" transform="rotate(45)"/>
      <polygon points="0,-120 12,-12 120,0 12,12 0,120 -12,12 -120,0 -12,-12" stroke="#D4AF37" opacity="0.4" transform="rotate(7.5)"/>
      <polygon points="0,-120 12,-12 120,0 12,12 0,120 -12,12 -120,0 -12,-12" stroke="#D4AF37" opacity="0.4" transform="rotate(22.5)"/>
      <polygon points="0,-120 12,-12 120,0 12,12 0,120 -12,12 -120,0 -12,-12" stroke="#2E7D32" opacity="0.35" transform="rotate(37.5)"/>
      <polygon points="0,-120 12,-12 120,0 12,12 0,120 -12,12 -120,0 -12,-12" stroke="#2E7D32" opacity="0.35" transform="rotate(52.5)"/>
    </g>
    
    <!-- Hexagonal layers -->
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#D4AF37" stroke-width="0.8" opacity="0.45"/>
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#2E7D32" stroke-width="0.8" opacity="0.4" transform="rotate(15)"/>
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#D4AF37" stroke-width="0.8" opacity="0.35" transform="rotate(30)"/>
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" stroke="#2E7D32" stroke-width="1" opacity="0.45" transform="rotate(30)"/>
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" stroke="#D4AF37" stroke-width="1.2" opacity="0.6"/>
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" stroke="#2E7D32" stroke-width="1" opacity="0.5" transform="rotate(30)"/>
    
    <!-- Glowing center -->
