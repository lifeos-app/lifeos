<svg width="512" height="768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <radialGradient id="glow6" cx="50%" cy="44%" r="40%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#2E7D32;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="768" fill="url(#bg6)"/>
  <rect width="512" height="768" fill="url(#glow6)"/>
  <rect x="12" y="12" width="488" height="744" rx="14" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <rect x="20" y="20" width="472" height="728" rx="10" fill="none" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>
  
  <!-- Full geometric mandala -->
  <g transform="translate(256, 330)" fill="none" stroke-width="0.8">
    <!-- Outermost ring - 24 rays -->
    <g stroke="#D4AF37" opacity="0.25">
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(0)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(15)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(30)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(45)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(60)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(75)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(105)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(120)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(135)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(150)"/>
      <line x1="0" y1="-160" x2="0" y2="160" transform="rotate(165)"/>
    </g>
    
    <!-- Concentric circles -->
    <circle cx="0" cy="0" r="155" stroke="#D4AF37" opacity="0.3"/>
    <circle cx="0" cy="0" r="130" stroke="#2E7D32" opacity="0.3"/>
    <circle cx="0" cy="0" r="105" stroke="#D4AF37" opacity="0.35"/>
    <circle cx="0" cy="0" r="80" stroke="#2E7D32" opacity="0.4"/>
    <circle cx="0" cy="0" r="55" stroke="#D4AF37" opacity="0.5"/>
    <circle cx="0" cy="0" r="30" stroke="#2E7D32" opacity="0.6"/>
    
    <!-- Multiple star layers -->
    <polygon points="0,-140 22,-22 140,0 22,22 0,140 -22,22 -140,0 -22,-22" stroke="#D4AF37" opacity="0.4"/>
    <polygon points="0,-140 22,-22 140,0 22,22 0,140 -22,22 -140,0 -22,-22" stroke="#D4AF37" opacity="0.4" transform="rotate(22.5)"/>
    <polygon points="0,-140 22,-22 140,0 22,22 0,140 -22,22 -140,0 -22,-22" stroke="#2E7D32" opacity="0.3" transform="rotate(45)"/>
    <polygon points="0,-140 22,-22 140,0 22,22 0,140 -22,22 -140,0 -22,-22" stroke="#2E7D32" opacity="0.3" transform="rotate(67.5)"/>
    
    <!-- Inner hexagonal layers -->
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#D4AF37" opacity="0.5"/>
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#2E7D32" opacity="0.4" transform="rotate(30)"/>
    <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32" stroke="#D4AF37" opacity="0.6"/>
    <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32" stroke="#2E7D32" opacity="0.5" transform="rotate(30)"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="15" stroke="#D4AF37" opacity="0.7" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#D4AF37" opacity="0.3"/>
    <circle cx="0" cy="0" r="3" fill="#2E7D32" opacity="0.5"/>
  </g>
  
  <text x="256" y="560" text-anchor="middle" fill="#e8e0d0" font-size="22" font-family="Georgia, serif">Geometric Mandala</text>
  <text x="256" y="590" text-anchor="middle" fill="#2E7D32" font-size="14" font-family="Georgia, serif">Sacred Geometry · Tier 6</text>
  <rect x="186" y="640" width="140" height="30" rx="15" fill="rgba(46,125,50,0.15)" stroke="#2E7D32" stroke-width="1"/>
  <text x="256" y="660" text-anchor="middle" fill="#2E7D32" font-size="12" font-family="system-ui">☪️ TIER 6 · SAGE</text>
</svg>