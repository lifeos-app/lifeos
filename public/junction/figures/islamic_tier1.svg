<svg width="512" height="768" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
  </defs>
  <rect width="512" height="768" fill="url(#bg1)"/>
  
  <!-- Border frame -->
  <rect x="16" y="16" width="480" height="736" rx="12" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <rect x="24" y="24" width="464" height="720" rx="8" fill="none" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Simple 8-pointed star pattern -->
  <g transform="translate(256, 340)" fill="none" stroke="#D4AF37" stroke-width="1.5">
    <!-- Central star -->
    <polygon points="0,-120 34,-34 120,0 34,34 0,120 -34,34 -120,0 -34,-34" opacity="0.8"/>
    <polygon points="0,-85 24,-24 85,0 24,24 0,85 -24,24 -85,0 -24,-24" opacity="0.6" stroke="#2E7D32"/>
    <polygon points="0,-50 14,-14 50,0 14,14 0,50 -14,14 -50,0 -14,-14" opacity="0.9"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="25" stroke="#D4AF37" opacity="0.5"/>
    <!-- Corner accents -->
    <circle cx="-85" cy="-85" r="12" stroke="#2E7D32" opacity="0.3"/>
    <circle cx="85" cy="-85" r="12" stroke="#2E7D32" opacity="0.3"/>
    <circle cx="-85" cy="85" r="12" stroke="#2E7D32" opacity="0.3"/>
    <circle cx="85" cy="85" r="12" stroke="#2E7D32" opacity="0.3"/>
  </g>
  
  <!-- Title -->
  <text x="256" y="560" text-anchor="middle" fill="#e8e0d0" font-size="22" font-family="Georgia, serif">Geometric Star</text>
  <text x="256" y="590" text-anchor="middle" fill="#2E7D32" font-size="14" font-family="Georgia, serif">Sacred Geometry · Tier 1</text>
  
  <!-- Tier badge -->
  <rect x="186" y="640" width="140" height="30" rx="15" fill="rgba(46,125,50,0.15)" stroke="#2E7D32" stroke-width="1"/>
  <text x="256" y="660" text-anchor="middle" fill="#2E7D32" font-size="12" font-family="system-ui">☪️ TIER 1 · INITIATE</text>
</svg>